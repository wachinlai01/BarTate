<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú Playa Flamenco</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    .logo {
      display: none;
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .logo img {
      max-width: 90%;
      height: auto;
    }

  .horarios {
    display: flex;
    flex-direction: column;  /* uno debajo de otro */
    align-items: center;     /* centrado horizontal */
    gap: 0.5rem;
    margin-top: 2rem;
  }

    /* LOGO PARA ESCRITORIO */
    @media (min-width: 768px) {
      .logo-desktop {
        display: block;
      }
    }

    /* LOGO SOLO FLAMENCO - MÓVIL VERTICAL */
    @media (max-width: 767px) and (orientation: portrait) {
      .logo-portrait {
        display: block;
      }
    }

    /* LOGO LETRAS + FLAMENCO HORIZONTAL */
    @media (max-width: 767px) and (orientation: landscape) {
      .logo-landscape {
        display: block;
      }
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 1rem;
    }

  .card {
    display: flex;
    align-items: center;   /* centra verticalmente */
    gap: 1rem;

    flex: 1 1 40vw;
    max-width: 45vw;
    min-height: 20vh;

    border-radius: 15px;
    padding: 1rem;
    background-color: transparent;
    color: black;
    text-decoration: none;
  }

  .card img {
    width: 40%;
    height: auto;
  }

  .card h2 {
    flex: 1;
    text-align: center;
    font-size: 1.8rem;
    margin: 0;
  }

  .card:hover {
      transform: scale(1.02);
  }

/*
    .card.bebidas {
      background: url('Mojito2.png') center/contain no-repeat;
    }

    .card.comida {
      background: url('hamburguesa.png') center/contain no-repeat;
    }
*/

/*
    .card h2 {
      background-color: rgba(0, 0, 0, 0.6);
      margin: 0;
      padding: 1.5rem;
      font-size: 1.8rem;
      position: absolute;
      bottom: 0;
      width: 100%;
    }
*/

  .card h2 {
    flex: 1;
    text-align: center;
    font-size: 1.8rem;
    margin: 0;
  }

    /* ✅ MÓVIL VERTICAL */
@media (max-width: 767px) and (orientation: portrait) {
  .container {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    flex: 1 1 80vw;
    max-width: 90vw;
    min-height: 25vh;
    max-height: 35vh;
  }

  .logo img {
    max-width: 80vw;
    height: auto;
    max-height: 15vh;
  }
}

/* ✅ MÓVIL HORIZONTAL */
@media (max-width: 767px) and (orientation: landscape) {
  .container {
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: space-around;
    padding: 0.5rem;
    gap: 1rem;
  }

  .card {
    flex: 1 1 40vw;
    max-width: 45vw;
    min-width: 0;
    min-height: 25vh;
    max-height: 35vh;
    flex-direction: column;
    text-align: center;
  }

  .card img {
    width: 70%;
  }

  .logo img {
    max-height: 20vh;
    width: auto;
    max-width: 40vw;
  }
}



  </style>
</head>
<body>

  <!-- LOGO VERSIÓNES -->
  <div class="logo logo-desktop">
    <img src="flamenco.png" alt="Logo completo">
  </div>

  <div class="logo logo-portrait">
    <img src="horizontal.png" alt="Solo flamenco">
  </div>

  <div class="logo logo-landscape">
    <img src="horizontal.png" alt="Letras + flamenco horizontal">
  </div>

  <!-- VIÑETAS -->
  <div class="container">
    <a class="card" href="Playa_Flamenco_Bebida.pdf" target="_blank">
      <img src="bebidas.jpeg" alt="Bebidas">
      <h2>Bebidas / Drinks</h2>
    </a>

    <a class="card" href="Playa_Flamenco_Comida.pdf" target="_blank">
      <img src="calamares.jpeg" alt="Comida">
      <h2>Comida / Food</h2>
    </a>
  </div>

  <div class="horarios">
    <h3><b></b>Horario Restaurante: </b> <b style="color: #7aaff1;">10:00-23:00</b></h3>
    <h3><b></b>Horario Hamacas: </b> <b style="color: #7aaff1;">10:00-19:00</b></h3>
  </div>

</body>
</html>
